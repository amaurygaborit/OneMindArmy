# ==============================================================================
# ONE MIND ARMY - PLAY CONFIGURATION
# Game: Chess | Mode: Human vs AI / AI vs AI Match
# ==============================================================================

name: chess

engine:
  numSimulations: 800
  maxDepth: 128

  cPUCT: 1.5
  virtualLoss: 2.0         # Lower penalty needed for single game
  gumbelK: 0              # top-k actions gardées à la racine (0 = Dirichlet classique)
  gumbelSigma: 0.0        # température pour la policy améliorée (0 = visit counts classiques)
  fpuValue: 0.0            # Assume unknown moves are neutral instead of bad

  maxNodes: 2000           # Allow the tree to grow huge for one game
  memoryThreshold: 0.90
  reuseTree: false         # Reuse tree between turns to think on opponent's time

  resignThreshold: -0.95
  resignMinPly: 40

backend:
  numGPUs: auto

  inferenceBatchSize: 256         # Small batch size for instant TensorRT response
  numParallelGames: 1

  precision: "fp16"

  numSearchThreads: 4             # Blast all CPU cores on this single game
  numBackpropThreads: 2
  numInferenceThreads: 1

  queueScale: 3.0
  fastDrain: true

session:
  numAIs: 2                # 1 = Human vs AI
  autoInitialState: true
  maxTimePerMove: 5.0      # AI has 5 seconds max to think
  temperature: 0.01        # Strict competitive play
  verbose: true

  renderState: true
  renderValidActions: true
  renderActionPlayed: true
  renderResult: true

# --- 6. GAME SPECIFIC (Full UI) ---
specific:
  render:
    whiteAtBottom: true
    showCoordinates: true
    replaceRendering: true
    renderRawState: false
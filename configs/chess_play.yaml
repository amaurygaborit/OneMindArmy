# ==============================================================================
# ONE MIND ARMY - PLAY CONFIGURATION
# Game: Chess | Mode: Human vs AI / AI vs AI Match
# Description: Optimized for single-game competitive inference (Low Latency).
# ==============================================================================
name: "chess"

# --- 2. MATCH ENGINE (Competitive Mode) ---
engine:
  numSimulations: 10000    # Increased for stronger play in live match
  maxDepth: 128

  cPUCT: 1.5
  dirichletAlpha: 0.0      # EXPLORATION OFF (Competitive play)
  dirichletEpsilon: 0.0    # EXPLORATION OFF
  temperatureDrop: 0       # Always play the best move (temp ~0)
  virtualLoss: 2.0         # Lower penalty needed for single game

  maxNodes: 1000000        # Allow the tree to grow huge for one game
  memoryThreshold: 0.90
  reuseTree: true          # Reuse tree between turns to think on opponent's time

# --- 4. LOCAL BACKEND (Low Latency) ---
backend:
  numGPUs: 1

  inferenceBatchSize: 256         # Small batch size for instant TensorRT response
  numParallelGames: 1

  precision: "fp16"

  numSearchThreads: 4      # Blast all CPU cores on this single game
  numBackpropThreads: 2
  numInferenceThreads: 1

  queueScale: 1.0
  fastDrain: true

# --- 5. INFERENCE SESSION (Human Interface) ---
session:
  numAIs: 2                # 1 = Human vs AI
  autoInitialState: true
  maxTimePerMove: 5.0      # AI has 5 seconds max to think
  temperature: 0.01        # Strict competitive play
  verbose: true

  renderState: true
  renderValidActions: true # Helpful for human player
  renderActionPlayed: true
  renderResult: true

# --- 6. GAME SPECIFIC (Full UI) ---
specific:
  render:
    whiteAtBottom: true
    showCoordinates: true
    replaceRendering: true
    renderRawState: false
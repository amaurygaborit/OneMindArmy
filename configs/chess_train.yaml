# ==============================================================================
# ONE MIND ARMY - TRAIN CONFIGURATION
# Game: Chess | Mode: AI vs AI
# ==============================================================================

name: chess

network:
  dModel: 256
  nHeads: 8
  nLayers: 10
  dimFeedforward: 512

engine:
  numSimulations: 800
  maxDepth: 128

  cPUCT: 1.5
  dirichletAlpha: 0.3
  dirichletEpsilon: 0.25
  temperatureDrop: 30
  virtualLoss: 0.0

  maxNodes: 1000
  memoryThreshold: 0.90
  reuseTree: false

  resignThreshold: -0.95
  resignMinPly: 40

training:
  gamesPerIteration: 5000
  slidingWindowSamples: 6000000
  maxWindowIterations: 10

  epochs: 1
  trainBatchSize: 1024

  learningRate: 0.001
  lrMinFactor: 0.1
  weightDecay: 0.0001
  valueLossWeight: 0.25

  currentIteration: 0
  logEveryNBatches: 100

backend:
  numGPUs: auto

  inferenceBatchSize: 2048
  numParallelGames: 8192

  precision: fp16

  numSearchThreads: 23
  numBackpropThreads: 7
  numInferenceThreads: 1

  queueScale: 3.0
  fastDrain: true
name: chess
network:
  dModel: 256
  nHeads: 8
  nLayers: 10
  dimFeedforward: 512

engine:
  numSimulations: 200
  maxDepth: 128

  cPUCT: 1.5
  fpuValue: 0.25
  virtualLoss: 0.0
  temperatureDropPly: 50

  gumbelK: 8
  gumbelCVisit: 50.0
  gumbelCScale: 1.0

  maxNodes: 50000
  memoryThreshold: 0.9
  reuseTree: false

  resignThreshold: -0.9
  resignMinPly: 30

training:
  gamesPerIteration: 5000
  slidingWindowSamples: 7500000
  maxWindowIterations: 15
  epochs: 1
  trainBatchSize: 1024

  learningRate: 0.001
  lrMinFactor: 0.1
  lrDecayType: "cosine"        # Options: "exponential", "linear", "cosine", "constant"
  lrDecayIterations: 100       # Le nombre d'itérations globales pour atteindre lrMinFactor

  weightDecay: 0.0001
  valueLossWeight: 1.0
  drawSampleRate: 0.2
  currentIteration: 0
  logEveryNBatches: 100

backend:
  numGPUs: auto
  inferenceBatchSize: 4096
  numParallelGames: 16384

  precision: fp16
  numSearchThreads: 26
  numBackpropThreads: 4
  numInferenceThreads: 1
  queueScale: 3.0
  fastDrain: true

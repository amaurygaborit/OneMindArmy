# ==============================================================================
# ONE MIND ARMY - TRAIN CONFIGURATION
# Game: Chess | Mode: AI vs AI
# ==============================================================================

name: chess

network:
  dModel: 256
  nHeads: 8
  nLayers: 10
  dimFeedforward: 512

engine:
  numSimulations: 800
  maxDepth: 128

  cPUCT: 1.5
  virtualLoss: 0.0
  gumbelK: 8          # top-k actions gardées à la racine (0 = Dirichlet classique)
  gumbelSigma: 1.0    # température pour la policy améliorée (0 = visit counts classiques)
  fpuValue: 1.5

  maxNodes: 1000
  memoryThreshold: 0.90
  reuseTree: false

  resignThreshold: -0.90
  resignMinPly: 30

training:
  gamesPerIteration: 10000
  slidingWindowSamples: 6000000
  maxWindowIterations: 10

  epochs: 1
  trainBatchSize: 1024

  learningRate: 0.001
  lrMinFactor: 0.1
  weightDecay: 0.0001
  valueLossWeight: 0.25
  drawSampleRate: 0.2

  currentIteration: 0
  logEveryNBatches: 100

backend:
  numGPUs: auto

  inferenceBatchSize: 2048
  numParallelGames: 8192

  precision: fp16

  numSearchThreads: 23
  numBackpropThreads: 7
  numInferenceThreads: 1

  queueScale: 3.0
  fastDrain: true